<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Qurakuna — Cotizador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--g:#2E8B2E;--gd:#1A5C1A;--gl:#E8F5E8;--bd:#ddd;--gr:#666;--tx:#222}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f4f4;color:var(--tx)}
header{background:var(--gd);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
header img{height:36px}
header h1{color:#fff;font-size:17px;font-weight:700}
header p{color:#90EE90;font-size:11px;margin-top:2px}
.wrap{max-width:700px;margin:0 auto;padding:24px 14px 80px}
.card{background:#fff;border-radius:12px;padding:22px;margin-bottom:14px;border:1px solid var(--bd);box-shadow:0 1px 6px rgba(0,0,0,.05)}
.ct{font-size:11px;font-weight:700;color:var(--gd);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--gl)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g1{margin-bottom:12px}
label{display:block;font-size:11px;font-weight:600;color:var(--gr);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
input,textarea,select{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:8px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--tx);background:#fafafa;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--g);background:#fff}
input[readonly]{background:#f0f0f0;color:var(--gd);font-weight:600}
textarea{min-height:52px;resize:vertical}
.pc{background:#fafafa;border:1.5px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pn{font-size:11px;font-weight:700;color:var(--gd);text-transform:uppercase}
.bdel{background:none;border:none;color:#c0392b;font-size:22px;line-height:1;cursor:pointer;padding:0 4px;border-radius:4px}
.bdel:hover{background:#ffeaea}
.ci{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border:1.5px solid var(--bd);border-radius:9px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .2s}
.ci:hover{border-color:var(--g);background:var(--gl)}
.ci input[type=checkbox]{width:16px;height:16px;margin-top:2px;accent-color:var(--g);flex-shrink:0;cursor:pointer}
.ci-t{font-size:13px;font-weight:600}
.ci-s{font-size:11px;color:var(--gr);margin-top:2px;line-height:1.4}
.badd{width:100%;padding:10px;background:none;border:2px dashed var(--g);color:var(--gd);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;border-radius:9px;cursor:pointer;margin-top:4px;transition:background .2s}
.badd:hover{background:var(--gl)}
.tot{display:flex;justify-content:space-between;align-items:center;background:var(--gd);color:#fff;border-radius:10px;padding:13px 16px;margin-top:12px}
.tot .lbl{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:1px}
.tot .amt{font-size:22px;font-weight:700;color:gold}
.bgen{display:block;width:100%;padding:14px;background:var(--gd);color:#fff;font-family:'Inter',sans-serif;font-size:16px;font-weight:700;border:none;border-radius:11px;cursor:pointer;margin-top:10px;box-shadow:0 4px 14px rgba(26,92,26,.3);transition:background .2s,transform .15s}
.bgen:hover{background:var(--g);transform:translateY(-1px)}
.bgen:disabled{background:#aaa;cursor:not-allowed;transform:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:50px;font-size:13px;font-weight:500;box-shadow:0 6px 20px rgba(0,0,0,.2);z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);color:#fff}
.toast.show{transform:translateX(-50%) translateY(0)}
.tok{background:var(--gd)}.terr{background:#c0392b}
@media(max-width:520px){.g2{grid-template-columns:1fr}}
</style>
</head>

  <div class="card">
    <div class="ct">Productos Opcionales</div>
    <label class="ci">
      <input type="checkbox" id="chk-pack">
      <div><div class="ci-t">Pack Cuidado Total — S/.60.00</div><div class="ci-s">Aceite de Neem + Bioestimulante + Limpiador de Hojas + Jabón Potásico</div></div>
    </label>
    <label class="ci">
      <input type="checkbox" id="chk-base">
      <div><div class="ci-t">Base Móvil Antirayones — S/.60.00</div><div class="ci-s">Estructura de fierro con ruedas para mover la maceta sin esfuerzo</div></div>
    </label>

    <div class="ct">Generar Cotización</div>
    <div class="g1"><label>Nota adicional (opcional)</label><textarea id="nota" placeholder="Ej: Maceta color blanco, entrega sábado..."></textarea></div>
    <div class="tot">
      <div><div class="lbl">Total estimado</div><div style="font-size:9px;opacity:.4;margin-top:2px">*No incluye IGV</div></div>
      <div class="amt" id="tot-disp">S/. 0.00</div>
    </div>
    <button class="bgen" id="btn-gen">🌿 Generar Cotización PDF</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var pCount=0;
document.getElementById('btn-add').addEventListener('click',addProd);
document.getElementById('chk-t').addEventListener('change',function(){
  document.getElementById('t-extra').style.display=this.checked?'block':'none';calcTotal();
});
document.getElementById('t-pre').addEventListener('input',calcTotal);
document.getElementById('chk-mano').addEventListener('change',function(){
  document.getElementById('mano-row').style.display=this.checked?'block':'none';calcTotal();
});
document.getElementById('mano-pre').addEventListener('input',calcTotal);
document.getElementById('chk-pack').addEventListener('change',calcTotal);
document.getElementById('chk-base').addEventListener('change',calcTotal);
function addProd(){
  pCount++;var n=pCount;
  var d=document.createElement('div');d.className='pc';d.id='p'+n;
  d.innerHTML='<div class="ph"><span class="pn">Producto '+n+'</span>'
    +(n>1?'<button class="bdel" onclick="delP('+n+')">×</button>':'')+'</div>'
    +'<div class="g2">'
    +'<div><label>Espacio</label><input id="esp'+n+'" type="text" placeholder="Ej: Sala, Comedor, Baño..."></div>'
    +'<div><label>Nombre *</label><input id="nom'+n+'" type="text" placeholder="Ej: Palmera Bambú"></div>'
    +'</div>'
    +'<div class="g2">'
    +'<div><label>Precio unitario (S/.)</label><input id="pre'+n+'" type="number" min="0" step="0.01" placeholder="0.00"></div>'
    +'<div><label>Cantidad</label><input id="cant'+n+'" type="number" min="1" value="1"></div>'
    +'</div>'
    +'<div class="g1"><label>Descripción</label>'
    +'<textarea id="desc'+n+'" placeholder="Ej: Palmera de 1.20m & Maceta fibra de vidrio..."></textarea></div>'
    +'<div class="g1">'
    +'<div><label>Subtotal</label><input id="sub'+n+'" type="text" readonly placeholder="S/. 0.00"></div>'
    +'</div>';
  document.getElementById('prods').appendChild(d);
  document.getElementById('pre'+n).addEventListener('input',calcTotal);
  document.getElementById('cant'+n).addEventListener('input',calcTotal);
  calcTotal();
}
function delP(n){var e=document.getElementById('p'+n);if(e){e.remove();calcTotal();}}
function calcTotal(){
  var t=0;
  for(var i=1;i<=pCount;i++){
    var el=document.getElementById('p'+i);if(!el)continue;
    var p=parseFloat(document.getElementById('pre'+i).value)||0;
    var c=parseInt(document.getElementById('cant'+i).value)||1;
    var s=p*c;t+=s;document.getElementById('sub'+i).value='S/. '+s.toFixed(2);
  }
  if(document.getElementById('chk-t').checked)t+=parseFloat(document.getElementById('t-pre').value)||0;
  if(document.getElementById('chk-mano').checked)t+=parseFloat(document.getElementById('mano-pre').value)||0;
  if(document.getElementById('chk-pack').checked)t+=60;
  if(document.getElementById('chk-base').checked)t+=60;
  document.getElementById('tot-disp').textContent='S/. '+t.toFixed(2);
}
function showToast(msg,err){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(err?'terr':'tok')+' show';
  setTimeout(function(){t.classList.remove('show');},3500);
}
document.getElementById('btn-gen').addEventListener('click',function(){
  var nombre=document.getElementById('nombre').value.trim();
  if(!nombre){showToast('Ingresa el nombre del cliente',true);return;}
  var prods=[];
  for(var i=1;i<=pCount;i++){
    var el=document.getElementById('p'+i);if(!el)continue;
    var nom=document.getElementById('nom'+i).value.trim();if(!nom)continue;
    prods.push({
      espacio:document.getElementById('esp'+i).value.trim(),
      nombre:nom,
      descripcion:document.getElementById('desc'+i).value.trim(),
      precio:parseFloat(document.getElementById('pre'+i).value)||0,
      cantidad:parseInt(document.getElementById('cant'+i).value)||1});
  }
  if(!prods.length){showToast('Agrega al menos un producto',true);return;}
  var datos={nombre:nombre,productos:prods,
    var distrito = document.getElementById('t-desc').value.trim();
    traslado:{incluye:document.getElementById('chk-t').checked,
      precio:parseFloat(document.getElementById('t-pre').value)||0,
      descripcion: distrito ? 'Recojo de Plantas & Traslado de Plantas, Personal, Macetas. Ida y Vuelta: ' + distrito + '.' : 'Recojo de Plantas & Traslado de Plantas, Personal, Macetas. Ida y Vuelta.'},
    mano_obra:{incluye:document.getElementById('chk-mano').checked,
      precio:parseFloat(document.getElementById('mano-pre').value)||0,
      descripcion:document.getElementById('mano-desc').value.trim()||'Servicio de instalación por jardinero.'},
    pack_cuidado:document.getElementById('chk-pack').checked,
    base_movil:document.getElementById('chk-base').checked,
    nota:document.getElementById('nota').value.trim()};
  var btn=document.getElementById('btn-gen');
  btn.disabled=true;btn.textContent='Generando PDF...';
  fetch('/generar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(datos)})
  .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});return r.blob();})
  .then(function(blob){
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;
    a.download='Cotizacion_Qurakuna_'+nombre.replace(/\s+/g,'_')+'.pdf';
    a.click();URL.revokeObjectURL(url);
    showToast('Cotizacion descargada correctamente');
  })
  .catch(function(e){showToast('Error: '+e.message,true);})
  .finally(function(){btn.disabled=false;btn.textContent='Generar Cotizacion PDF';});
});
document.getElementById('btn-add').click();
</script>
</body>
</html>
